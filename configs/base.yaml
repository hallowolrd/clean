# =========================
# 数据配置
# =========================

# 数据集名称：当前支持 cifar10 / cifar100
dataset: cifar10

# 数据集保存路径
data_root: ./datasets


# =========================
# 联邦学习配置
# =========================

# 客户端数量
num_clients: 10

# Dirichlet non-IID 划分参数
# alpha 越小，客户端数据越不均衡
alpha: 0.1

# 每轮参与训练的客户端比例
# 1.0 表示每轮所有客户端都参与
frac: 1.0

# 联邦训练轮数
rounds: 100

# 每个客户端每轮本地训练 epoch 数
local_epochs: 1


# =========================
# DataLoader 配置
# =========================

# 客户端本地训练 batch size
batch_size: 64

# 服务端测试 batch size
test_batch_size: 64

# DataLoader 使用的子进程数量
num_workers: 2


# =========================
# 模型配置
# =========================

# 模型名称：当前支持 resnet_switch_moe / resnet_sparse_moe_head
model: resnet_sparse_moe_head

# MoE expert 数量
num_experts: 4

# 每个样本路由激活的 expert 数量
topk: 2


# =========================
# 优化器配置
# =========================

optimizer:
  # 当前支持 sgd / adam / adamw
  type: adam

  # 学习率
  lr: 0.0005

  # SGD momentum
  # 当前 optimizer.type=adam 时这个字段不会被 Adam 使用
  momentum: 0.0

  # 权重衰减
  weight_decay: 0.0000


# =========================
# 聚合配置
# =========================

agg:
  # 非专家参数聚合方法
  # 包括 backbone / router / classifier / shared layers
  non_expert:
    method: sample_weighted

  # 专家参数聚合方法
  # 包括 MoE experts
  expert:
    method: uniform


# =========================
# 运行配置
# =========================

# 随机种子
seed: 3

# 设备选择
# auto 表示代码里自动选择 cuda 或 cpu
device: auto

# 输出根目录
output_dir: outputs

# 实验名
# auto 表示自动根据配置生成实验文件夹名
run_name: auto

run:
  # 同名实验目录存在时，自动追加 _v2 / _v3
  unique_name: true

  # 是否允许覆盖已有实验目录
  overwrite: false


# =========================
# 日志配置
# =========================

logging:
  # 每隔多少轮打印一次日志
  log_every: 1

  # 是否保存最终使用的配置
  save_config: true

  # 是否保存 results.csv
  save_results_csv: true

  # 是否在控制台显示 tqdm 动态进度条
  # 注意：进度条只用于控制台观察，不应该写入 train.log
  progress_bar: true

  # 是否允许在非交互终端显示进度条
  # 例如 nohup、重定向输出、后台运行时一般建议保持 false
  progress_in_non_tty: false

  # 是否在控制台打印每轮短摘要
  # 示例：
  # [Round 001] train_loss=... | train_acc=... | test_acc=...
  console_round_summary: true

  # 是否在 train.log 写入每轮详细日志
  # 包括 RoundMetrics / Clients / Agg / Client 这些诊断信息
  file_round_detail: true

  # 是否记录本轮选择了哪些客户端
  # 示例：
  # [Clients] round=1 ids=[0,4,9,6,7,3,2,8,1,5]
  log_round_clients: true

  # 是否在 train.log 中打印每个客户端一行诊断信息
  # 内容包括：
  # samples / train_loss / train_acc / non_expert_w / expert_w / expert_usage
  log_client_table: true

  # 是否记录客户端训练指标
  # 当前客户端表会使用 train_loss / train_acc / num_batches
  log_client_metrics: true

  # 是否记录每个客户端的聚合权重
  # 对诊断 expert 聚合是否真的产生差异很重要
  log_agg_weights: true

  # 如果所有客户端权重近似相等，压缩显示为：
  # weights=uniform(each=0.1000)
  # 避免日志出现一长串 0.10000000000000002
  compact_uniform_weights: true

  # 是否在客户端本地训练结束后统计 expert 使用情况
  # 统计结果会写入 ClientUpdate.extra["expert_usage"]
  collect_expert_usage: true

  # expert usage 最多统计多少个 batch
  # 0 表示使用完整客户端 train_loader 统计，最准确但会更慢
  # 如果觉得慢，可以改成 5 或 10
  expert_usage_max_batches: 0


# =========================
# checkpoint 配置
# =========================

checkpoint:
  # 是否启用 checkpoint
  enabled: true

  # 是否保存最新 checkpoint
  save_latest: true

  # 是否保存最佳 checkpoint
  save_best: true